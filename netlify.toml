[build]
  base    = "backend"
  publish = "../frontend"
  command = "npm install"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/contact"
  to   = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to   = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/messages"
  to   = "/.netlify/functions/admin-messages"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200